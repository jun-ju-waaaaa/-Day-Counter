<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>赤ちゃん 月齢・週齢・日齢 計算ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 20px;
    background: #fafafa;
    color: #111;
    transition: 0.3s;
  }

  /* ダークモード */
  @media (prefers-color-scheme: dark) {
    body {
      background: #121212;
      color: #f5f5f5;
    }

    .card {
      background: #2a2a2a; /* 濃いグレー */
      color: #fff;
    }

    button {
      background: #2d7dff;
    }
  }

  h1 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 600;
  }

  input[type="date"] {
    width: 100%;
    padding: 16px;
    font-size: 1.2rem;
    margin-bottom: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 16px;
    font-size: 1.2rem;
    background: #0066ff;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
  }

  .card {
    margin-top: 18px;
    padding: 18px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    font-size: 1.3rem;
    line-height: 1.9;
  }

  .label {
    font-size: 1.1rem;
    opacity: 0.7;
  }

  .value {
    font-size: 1.8rem;
    font-weight: 700;
    margin-top: 6px;
  }

  .placeholder {
    opacity: 0.6;
    font-size: 1.2rem;
  }
</style>
</head>
<body>

<h1>赤ちゃん 月齢・週齢・日齢 計算ツール</h1>

<input type="date" id="birthDate">
<button onclick="calculate()">計算する</button>

<!-- カードを最初から表示 -->
<div id="dayCard" class="card">
  <div class="placeholder">生後日数がここに表示されます</div>
</div>

<div id="weekCard" class="card">
  <div class="placeholder">生後週数がここに表示されます</div>
</div>

<div id="monthCard" class="card">
  <div class="placeholder">生後月齢がここに表示されます</div>
</div>

<script>
function calculate() {
  const birthValue = document.getElementById("birthDate").value;
  if (!birthValue) return;

  const birth = new Date(birthValue);
  const today = new Date();

  // 生後日数
  const diffTime = today - birth;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  // 生後週数
  const weeks = Math.floor(days / 7);
  const extraDays = days % 7;

  // 満月齢
  let months = (today.getFullYear() - birth.getFullYear()) * 12 +
               (today.getMonth() - birth.getMonth());
  if (today.getDate() < birth.getDate()) {
    months--;
  }

  document.getElementById("dayCard").innerHTML =
    `<div class="label">生後日数</div>
     <div class="value">${days} 日</div>`;

  document.getElementById("weekCard").innerHTML =
    `<div class="label">生後週数</div>
     <div class="value">${weeks} 週 ${extraDays} 日</div>`;

  document.getElementById("monthCard").innerHTML =
    `<div class="label">生後月齢</div>
     <div class="value">${months} ヶ月</div>`;
}
</script>

</body>
</html>
