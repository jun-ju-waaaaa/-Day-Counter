<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>赤ちゃん 月齢・週齢・日齢 計算ツール</title>
<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 20px;
    padding: 0;
    background: #f5f5f5;
    color: #222;
    transition: 0.3s;
  }

  @media (prefers-color-scheme: dark) {
    body {
      background: #121212;
      color: #eee;
    }
    .card {
      background: #1e1e1e;
      color: #eee;
    }
    button {
      background: #2d7dff;
    }
  }

  h1 {
    font-size: 1.4rem;
    margin-bottom: 20px;
  }

  input[type="date"] {
    padding: 10px;
    font-size: 1rem;
    margin-bottom: 10px;
  }

  button {
    padding: 10px 20px;
    font-size: 1rem;
    background: #0066ff;
    color: white;
    border: none;
    border-radius: 6px;
    cursor: pointer;
  }

  .card {
    margin-top: 20px;
    padding: 15px;
    background: white;
    border-radius: 10px;
    box-shadow: 0 2px 6px rgba(0,0,0,0.1);
  }
</style>
</head>
<body>

<h1>赤ちゃん 月齢・週齢・日齢 計算ツール</h1>

<input type="date" id="birthDate">
<button onclick="calculate()">計算</button>

<div id="result" class="card" style="display:none;"></div>

<script>
function calculate() {
  const birthValue = document.getElementById("birthDate").value;
  if (!birthValue) return;

  const birth = new Date(birthValue);
  const today = new Date();

  // 生後日数
  const diffTime = today - birth;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  // 生後週数
  const weeks = Math.floor(days / 7);
  const extraDays = days % 7;

  // 満月齢
  let months = (today.getFullYear() - birth.getFullYear()) * 12 +
               (today.getMonth() - birth.getMonth());
  if (today.getDate() < birth.getDate()) {
    months--;
  }

  document.getElementById("result").style.display = "block";
  document.getElementById("result").innerHTML =
    `生後 <strong>${days}</strong> 日<br>
     生後 <strong>${weeks}</strong> 週 ${extraDays} 日<br>
     生後 <strong>${months}</strong> ヶ月`;
}
</script>

</body>
</html>
