<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>赤ちゃん 月齢・週齢・日齢 計算ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  /* 色を変数化して背景とカードを連動させる */
  :root {
    --bg: #fafafa;
    --text: #111;
    --card: #e5e5e5;
    --input-bg: #f0f0f0;
    --border: #ccc;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --text: #f5f5f5;
      --card: #1e1e1e;
      --input-bg: #1a1a1a;
      --border: #333;
    }
  }

  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 20px;
    background: var(--bg);
    color: var(--text);
  }

  h1 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 600;
  }

  /* 入力欄とボタンの幅を完全に揃える（最小限の修正） */
  .form-wrapper {
  padding: 0 16px;
  overflow: hidden; /* ← 右のはみ出しを切る */
}

input[type="date"] {
  -webkit-appearance: none;
  appearance: none;
  width: 100%;
  max-width: 100%;
  box-sizing: border-box;
  padding: 16px;
  margin-bottom: 12px;
  font-size: 16px;
  border: 1px solid #ccc; /* ← iOS の誤差防止 */
  height: 52px;        /* ← 高さを固定 */
  padding-top: 0;      /* ← 内部UIの高さ変化を吸収 */
  padding-bottom: 0;   /* ← 内部UIの高さ変化を吸収 */
  line-height: 52px;   /* ← テキストを中央に寄せる */
  border-radius: 8px;
}

button {
  width: 100%;
  box-sizing: border-box;
  height: 52px;        /* ← input と同じ高さに固定 */
  line-height: 52px;   /* ← テキストを中央に */
  padding: 0 16px;     /* ← 横だけ余白にする */
  font-size: 16px;
  border-radius: 8px;
}


  /* カレンダー選択バーの背景色を背景に準拠 */
  input[type="date"] {
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);

    /* ← これだけが今回の“決定打” */
    padding-right: 0 !important;
  }

  /* iOS Safari の余白対策（必要最低限） */
  input[type="date"]::-webkit-calendar-picker-indicator {
    margin: 0;
    padding: 0;
    filter: invert(0.7);
  }

  /* ボタンのデザインは前のまま */
  button {
    background: #0066ff;
    color: white;
    font-weight: 600;
    border: 1px solid #0066ff;
  }

  /* カードのデザインも前のまま */
  .card {
    width: 100%;
    box-sizing: border-box;
    margin-top: 18px;
    padding: 18px;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    font-size: 1.3rem;
    line-height: 1.9;
    color: var(--text);
    height: 100px; /* ← 完全固定 */
    overflow: hidden; /* ← 内容が溢れないように */
}

  }

  .label {
    font-size: 1.1rem;
    opacity: 0.7;
  }

  .value {
    font-size: 1.8rem;
    font-weight: 700;
    margin-top: 6px;
  }

  .placeholder {
    opacity: 0.6;
    font-size: 1.2rem;
  }
</style>
</head>
<body>

<h1>赤ちゃん 月齢・週齢・日齢 計算ツール</h1>

<div class="date-wrapper">
  <input type="date" id="birthDate">
  <div class="date-placeholder" id="birthPlaceholder">
    日付を選択してください
  </div>
</div>
<button onclick="calculate()">計算する</button>

<div id="dayCard" class="card">
  <div class="placeholder">生後日数がここに表示されます</div>
</div>

<div id="weekCard" class="card">
  <div class="placeholder">生後週数がここに表示されます</div>
</div>

<div id="monthCard" class="card">
  <div class="placeholder">生後月齢がここに表示されます</div>
</div>

<script>
function calculate() {
  const birthValue = document.getElementById("birthDate").value;
  if (!birthValue) return;

  const birth = new Date(birthValue);
  const today = new Date();

  const diffTime = today - birth;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  const weeks = Math.floor(days / 7);
  const extraDays = days % 7;

  let months = (today.getFullYear() - birth.getFullYear()) * 12 +
               (today.getMonth() - birth.getMonth());
  if (today.getDate() < birth.getDate()) {
    months--;
  }

  document.getElementById("dayCard").innerHTML =
    `<div class="label">生後日数</div>
     <div class="value">${days} 日</div>`;

  document.getElementById("weekCard").innerHTML =
    `<div class="label">生後週数</div>
     <div class="value">${weeks} 週 ${extraDays} 日</div>`;

  document.getElementById("monthCard").innerHTML =
    `<div class="label">生後月齢</div>
     <div class="value">${months} ヶ月</div>`;
}
</script>

</body>
</html>
