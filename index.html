<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>赤ちゃん 月齢・週齢・日齢 計算ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  /* 背景・文字・カード色を変数化して統一管理 */
  :root {
    --bg: #fafafa;
    --text: #111;
    --card: #e5e5e5; /* 背景より少し濃い */
    --input-bg: #f0f0f0;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #121212;
      --text: #f5f5f5;
      --card: #1e1e1e; /* 背景より少し明るい濃いグレー */
      --input-bg: #1a1a1a;
    }
  }

  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 20px;
    background: var(--bg);
    color: var(--text);
    transition: 0.3s;
  }

  h1 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 600;
  }

  /* カレンダー選択バー（input[type=date]）のはみ出し防止 */
  input[type="date"] {
    width: 100%;
    max-width: 100%;
    box-sizing: border-box;
    padding: 16px;
    font-size: 1.2rem;
    margin-bottom: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
    background: var(--input-bg);
    color: var(--text);
  }

  /* iOS Safari のカレンダーアイコンも背景準拠 */
  input[type="date"]::-webkit-calendar-picker-indicator {
    filter: invert(0.7); /* ダークモードで白くなる */
  }

  button {
    width: 100%;
    padding: 16px;
    font-size: 1.2rem;
    background: #0066ff;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
  }

  /* カード幅を完全に統一（100%固定） */
  .card {
    width: 100%;
    box-sizing: border-box;
    margin-top: 18px;
    padding: 18px;
    background: var(--card);
    border-radius: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    font-size: 1.3rem;
    line-height: 1.9;
    color: var(--text);
  }

  .label {
    font-size: 1.1rem;
    opacity: 0.7;
  }

  .value {
    font-size: 1.8rem;
    font-weight: 700;
    margin-top: 6px;
  }

  .placeholder {
    opacity: 0.6;
    font-size: 1.2rem;
  }
</style>
</head>
<body>

<h1>赤ちゃん 月齢・週齢・日齢 計算ツール</h1>

<input type="date" id="birthDate">
<button onclick="calculate()">計算する</button>

<div id="dayCard" class="card">
  <div class="placeholder">生後日数がここに表示されます</div>
</div>

<div id="weekCard" class="card">
  <div class="placeholder">生後週数がここに表示されます</div>
</div>

<div id="monthCard" class="card">
  <div class="placeholder">生後月齢がここに表示されます</div>
</div>

<script>
function calculate() {
  const birthValue = document.getElementById("birthDate").value;
  if (!birthValue) return;

  const birth = new Date(birthValue);
  const today = new Date();

  const diffTime = today - birth;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  const weeks = Math.floor(days / 7);
  const extraDays = days % 7;

  let months = (today.getFullYear() - birth.getFullYear()) * 12 +
               (today.getMonth() - birth.getMonth());
  if (today.getDate() < birth.getDate()) {
    months--;
  }

  document.getElementById("dayCard").innerHTML =
    `<div class="label">生後日数</div>
     <div class="value">${days} 日</div>`;

  document.getElementById("weekCard").innerHTML =
    `<div class="label">生後週数</div>
     <div class="value">${weeks} 週 ${extraDays} 日</div>`;

  document.getElementById("monthCard").innerHTML =
    `<div class="label">生後月齢</div>
     <div class="value">${months} ヶ月</div>`;
}
</script>

</body>
</html>
