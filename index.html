<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>赤ちゃん 月齢・週齢・日齢 計算ツール</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
  body {
    font-family: system-ui, sans-serif;
    margin: 0;
    padding: 20px;
    background: #fafafa;
    color: #222;
    transition: 0.3s;
  }

  @media (prefers-color-scheme: dark) {
    body {
      background: #121212;
      color: #f5f5f5;
    }
    .card {
      background: #1e1e1e;
      color: #fff;
    }
    button {
      background: #2d7dff;
    }
  }

  h1 {
    font-size: 1.5rem;
    margin-bottom: 20px;
    text-align: center;
    font-weight: 600;
  }

  input[type="date"] {
    width: 100%;
    padding: 16px;
    font-size: 1.2rem;
    margin-bottom: 14px;
    border-radius: 10px;
    border: 1px solid #ccc;
  }

  button {
    width: 100%;
    padding: 16px;
    font-size: 1.2rem;
    background: #0066ff;
    color: white;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    font-weight: 600;
  }

  .card {
    margin-top: 22px;
    padding: 20px;
    background: white;
    border-radius: 14px;
    box-shadow: 0 3px 10px rgba(0,0,0,0.12);
    font-size: 1.35rem;
    line-height: 2.0;
    letter-spacing: 0.5px;
  }

  .placeholder {
    opacity: 0.6;
    font-size: 1.2rem;
  }

  strong {
    font-size: 1.5rem;
    font-weight: 700;
  }
</style>
</head>
<body>

<h1>赤ちゃん 月齢・週齢・日齢 計算ツール</h1>

<input type="date" id="birthDate">
<button onclick="calculate()">計算する</button>

<div id="result" class="card">
  <div class="placeholder">誕生日を入力すると、ここに結果が表示されます。</div>
</div>

<script>
function calculate() {
  const birthValue = document.getElementById("birthDate").value;
  if (!birthValue) return;

  const birth = new Date(birthValue);
  const today = new Date();

  const diffTime = today - birth;
  const days = Math.floor(diffTime / (1000 * 60 * 60 * 24));

  const weeks = Math.floor(days / 7);
  const extraDays = days % 7;

  let months = (today.getFullYear() - birth.getFullYear()) * 12 +
               (today.getMonth() - birth.getMonth());
  if (today.getDate() < birth.getDate()) {
    months--;
  }

  document.getElementById("result").innerHTML =
    `生後 <strong>${days}</strong> 日<br>
     生後 <strong>${weeks}</strong> 週 ${extraDays} 日<br>
     生後 <strong>${months}</strong> ヶ月`;
}
</script>

</body>
</html>
