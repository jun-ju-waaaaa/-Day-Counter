<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>生まれて何日？｜赤ちゃん月齢・週齢・日齢を自動計算｜シンプルで見やすい育児ツール</title>
  <meta name="description" content="赤ちゃんの生年月日を入力するだけで、月齢・週齢・日齢を自動で計算！スマホ対応のシンプルな育児サポートツールです。">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="favicon-32x32.png">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">

  <style>
    :root {
      --bg: #fafafa;
      --text: #111;
      --card: #e5e5e5;
      --input-bg: #f0f0f0;
      --border: #ccc;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #121212;
        --text: #f5f5f5;
        --card: #1e1e1e;
        --input-bg: #1a1a1a;
        --border: #333;
      }
    }

    body {
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 20px;
      background: var(--bg);
      color: var(--text);
    }

    h1 {
      font-size: 1.6rem;
      margin-bottom: 12px;
      text-align: center;
      font-weight: 600;
    }

    h2 {
      font-size: 1.2rem;
      text-align: center;
      margin-bottom: 16px;
      font-weight: 500;
      opacity: 0.8;
    }

    p {
      text-align: center;
      font-size: 0.95rem;
      margin-bottom: 24px;
      opacity: 0.8;
    }

    .date-wrapper {
      position: relative;
      margin-bottom: 12px;
    }

    .date-placeholder {
      position: absolute;
      left: 16px;
      top: 50%;
      transform: translateY(-50%);
      color: #888;
      pointer-events: none;
      font-size: 16px;
      opacity: 0.7;
      z-index: 2;
    }

    input[type="date"] {
      width: 100%;
      padding: 16px;
      font-size: 16px;
      border: 1px solid var(--border);
      background: var(--input-bg);
      color: var(--text);
      height: 52px;
      border-radius: 8px;
    }

    button {
      width: 100%;
      height: 52px;
      font-size: 16px;
      border-radius: 8px;
      background: #0066ff;
      color: white;
      font-weight: 600;
      border: 1px solid #0066ff;
      margin-top: 10px;
    }

    .toggle {
      margin: 10px 0 20px;
      font-size: 0.95rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card {
      margin-top: 18px;
      padding: 22px;
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 3px 10px rgba(0,0,0,0.12);
      font-size: 1.3rem;
      line-height: 1.9;
      color: var(--text);
      height: 110px;
      overflow: hidden;
    }

    .label {
      font-size: 1.1rem;
      opacity: 0.7;
    }

    .value {
      font-size: 1.8rem;
      font-weight: 700;
      margin-top: 6px;
    }

    .placeholder {
      opacity: 0.6;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>

<h1>赤ちゃん 生まれて何日？</h1>
<h2>生年月日を入力するだけで、現在の月齢・週齢・日齢を自動で計算できます。</h2>

<div class="date-wrapper">
  <input type="date" id="birthDate">
  <div class="date-placeholder" id="birthPlaceholder">
    カレンダーから生年月日を選んでください
  </div>
</div>

<label class="toggle">
  <input type="checkbox" id="includeFirstDay">
  初日（生まれた日）を1日として含める
</label>

<button onclick="calculate()">計算する</button>

<div id="dayCard" class="card">
  <div class="placeholder">生後日数がここに表示されます</div>
</div>

<div id="weekCard" class="card">
  <div class="placeholder">生後週数がここに表示されます</div>
</div>

<div id="monthCard" class="card">
  <div class="placeholder">生後月齢がここに表示されます</div>
</div>

<script>
  const birthInput = document.getElementById("birthDate");
  const birthPlaceholder = document.getElementById("birthPlaceholder");
  const includeFirstDay = document.getElementById("includeFirstDay");

  birthInput.addEventListener("change", () => {
    birthPlaceholder.style.display = birthInput.value ? "none" : "block";
  });

  function calculate() {
    const birthValue = birthInput.value;
    if (!birthValue) return;

    const birth = new Date(birthValue);
    const today = new Date();

    let diffDays = Math.floor((today - birth) / (1000 * 60 * 60 * 24));

    // ★ 初日を含める場合は +1
    if (includeFirstDay.checked) diffDays += 1;

    const weeks = Math.floor(diffDays / 7);
    const extraDays = diffDays % 7;

    let months = (today.getFullYear() - birth.getFullYear()) * 12 +
                 (today.getMonth() - birth.getMonth());
    if (today.getDate() < birth.getDate()) months--;

    document.getElementById("dayCard").innerHTML =
      `<div class="label">生後日数</div><div class="value">${diffDays} 日</div>`;

    document.getElementById("weekCard").innerHTML =
      `<div class="label">生後週数</div><div class="value">${weeks} 週 ${extraDays} 日</div>`;

    document.getElementById("monthCard").innerHTML =
      `<div class="label">生後月齢</div><div class="value">${months} ヶ月</div>`;
  }
</script>

</body>
</html>
